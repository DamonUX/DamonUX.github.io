<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptBlox — Premium Script Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-deep: #08090f;
            --surface-glass: rgba(18, 20, 30, 0.55);
            --surface-glass-hover: rgba(22, 24, 36, 0.7);
            --border-glass: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(99, 102, 241, 0.35);
            --neon-indigo: #6366f1;
            --neon-purple: #a855f7;
            --neon-cyan: #22d3ee;
            --glow-indigo: rgba(99, 102, 241, 0.45);
            --glow-purple: rgba(168, 85, 247, 0.35);
            --text-primary: #f0f0f5;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --radius-card: 18px;
            --radius-btn: 50px;
            --radius-input: 60px;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-card: 0 12px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px var(--glow-indigo), 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Animated background orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            will-change: transform;
            animation: orbFloat 25s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 70vw;
            height: 70vw;
            max-width: 900px;
            max-height: 900px;
            background: radial-gradient(circle at 30% 30%, var(--neon-indigo), transparent 70%);
            top: -20%;
            left: -15%;
            animation-duration: 28s;
        }
        .orb-2 {
            width: 60vw;
            height: 60vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle at 70% 60%, var(--neon-purple), transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-duration: 22s;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 40vw;
            height: 40vw;
            max-width: 500px;
            max-height: 500px;
            background: radial-gradient(circle at 50% 50%, var(--neon-cyan), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.06;
            animation-duration: 20s;
            animation-delay: -12s;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(5vw, -4vh) scale(1.08);
            }
            50% {
                transform: translate(-3vw, 6vh) scale(0.94);
            }
            75% {
                transform: translate(-6vw, -2vh) scale(1.04);
            }
            100% {
                transform: translate(2vw, 3vh) scale(0.98);
            }
        }

        /* Glassmorphism mixin via classes */
        .glass {
            background: var(--surface-glass);
            backdrop-filter: blur(18px) saturate(120%);
            -webkit-backdrop-filter: blur(18px) saturate(120%);
            border: 1px solid var(--border-glass);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .glass-strong {
            background: rgba(22, 24, 36, 0.7);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }
        .glass-card {
            background: rgba(20, 22, 33, 0.45);
            backdrop-filter: blur(14px) saturate(110%);
            -webkit-backdrop-filter: blur(14px) saturate(110%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-card);
            transition: all var(--transition-smooth);
            box-shadow: var(--shadow-card);
            will-change: transform, box-shadow, border-color;
        }
        .glass-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
            transform: translateY(-6px) scale(1.02);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }

        /* Layout */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.8rem 1.8rem;
            flex-wrap: wrap;
            background: rgba(12, 13, 20, 0.75);
            backdrop-filter: blur(25px) saturate(140%);
            -webkit-backdrop-filter: blur(25px) saturate(140%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.6);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, #818cf8, #c084fc, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 25px rgba(129, 140, 248, 0.4);
            transition: filter 0.3s;
            cursor: default;
        }
        .logo i {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
        }
        .logo:hover {
            filter: brightness(1.2);
        }
        .search-wrapper {
            flex: 1;
            max-width: 520px;
            min-width: 220px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 0.75rem 1.2rem 0.75rem 3rem;
            border-radius: var(--radius-input);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(18, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: all var(--transition-smooth);
            letter-spacing: 0.2px;
        }
        .search-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }
        .search-input:focus {
            border-color: var(--neon-indigo);
            box-shadow: 0 0 18px var(--glow-indigo), 0 0 35px rgba(99, 102, 241, 0.2);
            background: rgba(22, 25, 38, 0.75);
        }
        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            transition: color 0.3s;
        }
        .search-input:focus+.search-icon {
            color: var(--neon-indigo);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.8rem;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s, text-shadow 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-indigo);
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px var(--glow-indigo);
        }
        .nav-links a:hover {
            color: var(--text-primary);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        /* Main container */
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            padding: 1.8rem;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* Sidebar / Filter bar */
        .filter-sidebar {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .filter-sidebar h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.2rem;
        }
        .filter-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .filter-chip {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all var(--transition-smooth);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: rgba(22, 24, 36, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            user-select: none;
        }
        .filter-chip:hover {
            border-color: rgba(99, 102, 241, 0.4);
            color: #d1d5db;
            background: rgba(30, 32, 48, 0.7);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .filter-chip.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--neon-indigo);
            color: white;
            font-weight: 600;
            box-shadow: 0 0 18px var(--glow-indigo);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        /* Content area */
        .content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .result-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .sort-options {
            display: flex;
            gap: 0.5rem;
        }
        .sort-btn {
            padding: 0.5rem 1.2rem;
            border-radius: var(--radius-btn);
            cursor: pointer;
            transition: all var(--transition-smooth);
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(22, 24, 36, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            user-select: none;
        }
        .sort-btn.active,
        .sort-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--neon-indigo);
            color: white;
            box-shadow: 0 0 15px var(--glow-indigo);
        }
        .sort-btn.active {
            font-weight: 700;
            box-shadow: 0 0 20px var(--glow-indigo);
        }

        /* Script Grid */
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
        }
        .script-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            cursor: default;
            animation: fadeInUp 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .card-img {
            height: 110px;
            background: linear-gradient(145deg, rgba(30, 32, 45, 0.7), rgba(20, 22, 33, 0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .card-img .game-icon {
            filter: drop-shadow(0 0 12px rgba(99, 102, 241, 0.5));
            transition: transform 0.3s;
        }
        .script-card:hover .card-img .game-icon {
            transform: scale(1.15) rotate(-2deg);
        }
        .badge-new {
            position: absolute;
            top: 10px;
            right: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.7rem;
            border-radius: 30px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            text-transform: uppercase;
        }
        .card-body {
            padding: 1rem 1rem 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .script-name {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
            letter-spacing: 0.1px;
        }
        .game-name {
            font-size: 0.82rem;
            font-weight: 600;
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .author {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .card-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .card-stats span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .card-stats i {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }
        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-smooth);
            font-weight: 700;
            font-size: 0.85rem;
            background: rgba(20, 22, 33, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            user-select: none;
        }
        .page-btn.active {
            background: rgba(99, 102, 241, 0.25);
            border-color: var(--neon-indigo);
            color: white;
            box-shadow: 0 0 18px var(--glow-indigo);
        }
        .page-btn:hover:not(.active):not(:disabled) {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(30, 32, 48, 0.7);
            color: #d1d5db;
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Footer */
        .footer {
            background: rgba(12, 13, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            z-index: 1;
            position: relative;
        }
        .footer span {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 0.7rem 1rem;
                gap: 0.8rem;
                flex-direction: column;
                align-items: stretch;
            }
            .logo {
                font-size: 1.5rem;
                justify-content: center;
            }
            .search-wrapper {
                max-width: 100%;
            }
            .nav-links {
                justify-content: center;
                gap: 1.2rem;
                flex-wrap: wrap;
            }
            .main-container {
                padding: 1rem;
                gap: 1rem;
            }
            .script-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.8rem;
            }
            .card-img {
                height: 85px;
                font-size: 2.4rem;
            }
            .sort-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            .filter-list {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 0.4rem;
                -webkit-overflow-scrolling: touch;
            }
            .filter-chip {
                flex-shrink: 0;
                font-size: 0.8rem;
                padding: 0.4rem 0.9rem;
            }
        }
        @media (min-width: 769px) {
            .main-container {
                grid-template-columns: 250px 1fr;
                align-items: start;
                max-width: 1300px;
                margin: 0 auto;
                width: 100%;
            }
            .filter-sidebar {
                position: sticky;
                top: 100px;
                background: rgba(18, 20, 30, 0.4);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 20px;
                padding: 1.5rem;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            }
            .filter-list {
                flex-direction: column;
                gap: 0.3rem;
            }
            .filter-chip {
                justify-content: flex-start;
            }
        }
    </style>
</head>

    <nav class="navbar">

                { id: 8, name: "Auto Rob Bank", game: "Jailbreak", author: "MoneyHeist", downloads: 7600,

                { id: 9, name: "Silent Aim", game: "Murder Mystery 2", author: "SharpShot", downloads: 6100,
                    date: "2026-06-25", icon: "🤫" },
                { id: 10, name: "Anti-AFK & Farm", game: "Adopt Me!", author: "BabyCare", downloads: 5400,
                    date: "2026-06-24", icon: "👶" },
                { id: 11, name: "Auto Collect Orbs", game: "Pet Simulator X", author: "OrbGoblin", downloads: 4700,
                    date: "2026-06-23", icon: "✨" },
                { id: 12, name: "Admin Commands", game: "Brookhaven", author: "RoleplayKing", downloads: 3900,
                    date: "2026-06-22", icon: "🛡️" },
                { id: 13, name: "Insta Kill", game: "Blox Fruits", author: "OneShot", downloads: 3100,
                date: "2026-06-21", icon: "⚔️" },
                { id: 14, name: "Scam Script", game: "Adopt Me!", author: "TrustMeBro", downloads: 2100,
                    date: "2026-06-20", icon: "⚠️" },
                { id: 15, name: "Auto Arrest", game: "Jailbreak", author: "CopBot", downloads: 1800,
                date: "2026-06-19", icon: "🚔" },
                { id: 16, name: "Fruit Sniper", game: "Blox Fruits", author: "Sn1perX", downloads: 12500,
                    date: "2026-06-28", icon: "🎯" },
                { id: 17, name: "Trade Scam Detector", game: "Adopt Me!", author: "SafeTrade", downloads: 9600,
                    date: "2026-06-27", icon: "🔍" },
                { id: 18, name: "Speed Boost", game: "Murder Mystery 2", author: "FlashStep", downloads: 4400,
                    date: "2026-06-18", icon: "⚡" },
            ];

            // Estado global
            let currentGame = 'all';
            let currentSort = 'newest';
            let currentSearch = '';
            let currentPage = 1;
            const itemsPerPage = 12;

            // Elementos do DOM
            const searchInput = document.getElementById('searchInput');
            const gameFilterContainer = document.getElementById('gameFilter');
            const sortBtns = document.querySelectorAll('.sort-btn');
            const scriptGrid = document.getElementById('scriptGrid');
            const paginationDiv = document.getElementById('pagination');
            const resultCountSpan = document.getElementById('resultCount');

            // Função que aplica filtros e ordenação
            function getFilteredScripts() {
                let filtered = scripts.filter(script => {
                    const matchGame = currentGame === 'all' || script.game === currentGame;
                    const term = currentSearch.toLowerCase().trim();
                    const matchSearch = term === '' ||
                        script.name.toLowerCase().includes(term) ||
                        script.author.toLowerCase().includes(term) ||
                        script.game.toLowerCase().includes(term);
                    return matchGame && matchSearch;
                });

                if (currentSort === 'newest') {
                    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
                } else if (currentSort === 'downloads') {
                    filtered.sort((a, b) => b.downloads - a.downloads);
                }
                return filtered;
            }

            // Verifica se o script é novo (últimos 3 dias a partir da data mais recente)
            function isNewScript(script) {
                const now = new Date('2026-07-01'); // data de referência simulada
                const scriptDate = new Date(script.date);
                const diffTime = now - scriptDate;
                const diffDays = diffTime / (1000 * 60 * 60 * 24);
                return diffDays <= 3;
            }

            // Renderiza a página atual
            function renderPage() {
                const filtered = getFilteredScripts();
                const totalItems = filtered.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                const start = (currentPage - 1) * itemsPerPage;
                const pageItems = filtered.slice(start, start + itemsPerPage);

                resultCountSpan.textContent =
                    `${totalItems} script${totalItems !== 1 ? 's' : ''} encontrado${totalItems !== 1 ? 's' : ''}`;

                // Constrói os cards como string HTML
                scriptGrid.innerHTML = pageItems.map(script => {
                    const badge = isNewScript(script) ?
                        '<span class="badge-new">Novo</span>' : '';
                    return `
                    <div class="script-card glass-card">
                        <div class="card-img">
                            <span class="game-icon">${script.icon}</span>
                            ${badge}
                        </div>
                        <div class="card-body">
                            <div class="script-name" title="${script.name}">${script.name}</div>
                            <div class="game-name">${script.game}</div>
                            <div class="author">por ${script.author}</div>
                            <div class="card-stats">
                                <span><i class="fas fa-download"></i> ${formatNumber(script.downloads)}</span>
                                <span><i class="far fa-calendar-alt"></i> ${formatDate(script.date)}</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                // Anima cards com stagger progressivo
                const cards = scriptGrid.querySelectorAll('.script-card');
                cards.forEach((card, index) => {
                    card.style.animationDelay = `${index * 0.04}s`;
                    card.style.opacity = '0'; // Reinicia opacidade para animação CSS
                    // Força reflow para reiniciar animação
                    void card.offsetWidth;
                    card.style.animation = 'none';
                    void card.offsetWidth;
                    card.style.animation =
                        `fadeInUp 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards ${index * 0.04}s`;
                });

                renderPagination(totalPages, totalItems);
            }

            function renderPagination(totalPages, totalItems) {
                if (totalItems <= itemsPerPage && totalPages <= 1) {
                    paginationDiv.innerHTML = '';
                    return;
                }
                let html = '';
                html +=
                    `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}" aria-label="Anterior"><i class="fas fa-chevron-left"></i></button>`;

                const maxVisible = 5;
                let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
                let endPage = Math.min(totalPages, startPage + maxVisible - 1);
                if (endPage - startPage < maxVisible - 1) {
                    startPage = Math.max(1, endPage - maxVisible + 1);
                }

                if (startPage > 1) {
                    html += `<button class="page-btn" data-page="1">1</button>`;
                    if (startPage > 2) html += `<span class="page-btn" style="border:none;background:none;cursor:default;">…</span>`;
                }

                for (let i = startPage; i <= endPage; i++) {
                    html +=
                        `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }

                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) html +=
                        `<span class="page-btn" style="border:none;background:none;cursor:default;">…</span>`;
                    html += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
                }

                html +=
                    `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}" aria-label="Próximo"><i class="fas fa-chevron-right"></i></button>`;

                paginationDiv.innerHTML = html;

                // Event listeners para botões de página
                paginationDiv.querySelectorAll('.page-btn:not([disabled]):not([style*="cursor:default"])').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const page = parseInt(this.dataset.page);
                        if (page >= 1 && page <= totalPages && page !== currentPage) {
                            currentPage = page;
                            renderPage();
                            document.querySelector('.content').scrollIntoView({ behavior: 'smooth',
                                block: 'start' });
                        }
                    });
                });
            }

            function formatNumber(num) {
                if (num >= 1000) {
                    return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
                }
                return num.toString();
            }

            function formatDate(dateStr) {
                const date = new Date(dateStr + 'T00:00:00');
                const day = date.getDate().toString().padStart(2, '0');
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                return `${day}/${month}`;
            }

            // Event Listeners
            searchInput.addEventListener('input', function(e) {
                currentSearch = e.target.value;
                currentPage = 1;
                renderPage();
            });

            gameFilterContainer.addEventListener('click', function(e) {
                const chip = e.target.closest('.filter-chip');
                if (!chip) return;
                document.querySelectorAll('#gameFilter .filter-chip').forEach(c => c.classList.remove(
                    'active'));
                chip.classList.add('active');
                currentGame = chip.dataset.game;
                currentPage = 1;
                renderPage();
            });

            sortBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    sortBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSort = this.dataset.sort;
                    currentPage = 1;
                    renderPage();
                });
            });

            // Render inicial
            renderPage();
        })();
    </script>
</body>
