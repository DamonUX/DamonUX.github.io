<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptBlox Clone – GitHub Pages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --text: #e0e0e0;
            --text2: #aaa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --red: #ef4444;
            --green: #22c55e;
            --border: #2a2a2a;
            --radius: 10px;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Header / Navbar */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .logo i {
            background: linear-gradient(135deg, #3b82f6, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        .search-box input:focus {
            border-color: var(--accent);
        }
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .nav-links a {
            color: var(--text2);
            transition: color 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .nav-links a:hover {
            color: var(--text);
        }
        .btn-login {
            background: var(--accent);
            color: white !important;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: var(--accent-hover);
        }

        /* Main layout */
        .main-container {
            display: flex;
            flex: 1;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 90px;
        }
        .sidebar h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .filter-list li {
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text2);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-list li:hover,
        .filter-list li.active {
            background: var(--surface2);
            color: var(--text);
        }
        .filter-list li.active {
            font-weight: 600;
            color: var(--accent);
            background: rgba(59,130,246,0.1);
        }

        /* Content */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .sort-options {
            display: flex;
            gap: 0.5rem;
        }
        .sort-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .sort-btn.active,
        .sort-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 1.2rem;
        }

        .script-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }
        .script-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .card-img {
            height: 100px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--accent);
            background: linear-gradient(145deg, #1e1e1e, #252525);
        }
        .card-body {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .script-name {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }
        .game-name {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .author {
            font-size: 0.8rem;
            color: var(--text2);
        }
        .card-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            font-size: 0.8rem;
            color: var(--text2);
        }
        .card-stats i {
            margin-right: 0.2rem;
            font-size: 0.7rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            margin-top: 1rem;
        }
        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 1.2rem;
            font-size: 0.85rem;
            color: var(--text2);
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: static;
            }
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-cube"></i> ScriptBlox
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar scripts...">
        </div>
        <div class="nav-links">
            <a href="#"><i class="fas fa-home"></i> Início</a>
            <a href="#"><i class="fas fa-fire"></i> Populares</a>
            <a href="#" class="btn-login"><i class="fas fa-user"></i> Entrar</a>
        </div>
    </nav>

    <div class="main-container">
        <!-- Sidebar com filtros de jogo -->
        <aside class="sidebar">
            <h3><i class="fas fa-gamepad"></i> Jogos</h3>
            <ul class="filter-list" id="gameFilter">
                <li data-game="all" class="active"><i class="fas fa-globe"></i> Todos</li>
                <li data-game="Blox Fruits"><i class="fas fa-apple-alt"></i> Blox Fruits</li>
                <li data-game="Adopt Me!"><i class="fas fa-dog"></i> Adopt Me!</li>
                <li data-game="Murder Mystery 2"><i class="fas fa-mask"></i> Murder Mystery 2</li>
                <li data-game="Pet Simulator X"><i class="fas fa-paw"></i> Pet Simulator X</li>
                <li data-game="Jailbreak"><i class="fas fa-lock"></i> Jailbreak</li>
                <li data-game="Brookhaven"><i class="fas fa-city"></i> Brookhaven</li>
            </ul>
        </aside>

        <!-- Conteúdo principal -->
        <main class="content">
            <div class="sort-bar">
                <span id="resultCount">12 scripts encontrados</span>
                <div class="sort-options">
                    <button class="sort-btn active" data-sort="newest">Recentes</button>
                    <button class="sort-btn" data-sort="downloads">Mais baixados</button>
                </div>
            </div>

            <div class="script-grid" id="scriptGrid"></div>

            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <footer class="footer">
        <p>Clone estático do ScriptBlox – apenas HTML/CSS/JS para GitHub Pages. Nenhum script real é hospedado.</p>
    </footer>

    <script>
        (function() {
            // Dados de exemplo (scripts)
            const scripts = [
                { id:1, name:"Auto Farm Blox Fruits", game:"Blox Fruits", author:"xXPhoenixXx", downloads:15420, date:"2026-06-28", icon:"🍎" },
                { id:2, name:"ESP & Aimbot", game:"Murder Mystery 2", author:"DarkNinja", downloads:13200, date:"2026-06-27", icon:"🎯" },
                { id:3, name:"Pet Duper v3", game:"Adopt Me!", author:"CrystalHacker", downloads:18700, date:"2026-06-29", icon:"🐾" },
                { id:4, name:"Infinite Money GUI", game:"Jailbreak", author:"RobberMaster", downloads:12100, date:"2026-06-25", icon:"💰" },
                { id:5, name:"Auto Hatch & Farm", game:"Pet Simulator X", author:"SimFanatic", downloads:9800, date:"2026-06-30", icon:"🥚" },
                { id:6, name:"Fly & Noclip", game:"Brookhaven", author:"Glitchy", downloads:11500, date:"2026-06-26", icon:"🏠" },
                { id:7, name:"Teleport GUI", game:"Blox Fruits", author:"PortMaster", downloads:8300, date:"2026-06-24", icon:"🌀" },
                { id:8, name:"Auto Rob Bank", game:"Jailbreak", author:"MoneyHeist", downloads:7600, date:"2026-06-22", icon:"🏦" },
                { id:9, name:"Silent Aim", game:"Murder Mystery 2", author:"SharpShot", downloads:6100, date:"2026-06-20", icon:"🤫" },
                { id:10, name:"Anti-AFK & Farm", game:"Adopt Me!", author:"BabyCare", downloads:5400, date:"2026-06-19", icon:"👶" },
                { id:11, name:"Auto Collect Orbs", game:"Pet Simulator X", author:"OrbGoblin", downloads:4700, date:"2026-06-18", icon:"✨" },
                { id:12, name:"Admin Commands", game:"Brookhaven", author:"RoleplayKing", downloads:3900, date:"2026-06-17", icon:"🛡️" },
                { id:13, name:"Insta Kill", game:"Blox Fruits", author:"OneShot", downloads:3100, date:"2026-06-16", icon:"⚔️" },
                { id:14, name:"Scam Script", game:"Adopt Me!", author:"TrustMeBro", downloads:2100, date:"2026-06-15", icon:"⚠️" },
                { id:15, name:"Auto Arrest", game:"Jailbreak", author:"CopBot", downloads:1800, date:"2026-06-14", icon:"🚔" }
            ];

            // Estado
            let currentGame = 'all';
            let currentSort = 'newest';
            let currentSearch = '';
            let currentPage = 1;
            const itemsPerPage = 12;

            // Elementos DOM
            const searchInput = document.getElementById('searchInput');
            const gameFilter = document.getElementById('gameFilter');
            const sortBtns = document.querySelectorAll('.sort-btn');
            const scriptGrid = document.getElementById('scriptGrid');
            const paginationDiv = document.getElementById('pagination');
            const resultCountSpan = document.getElementById('resultCount');

            // Renderização
            function filterScripts() {
                let filtered = scripts.filter(s => {
                    const matchGame = currentGame === 'all' || s.game === currentGame;
                    const searchTerm = currentSearch.toLowerCase();
                    const matchSearch = s.name.toLowerCase().includes(searchTerm) ||
                                       s.author.toLowerCase().includes(searchTerm) ||
                                       s.game.toLowerCase().includes(searchTerm);
                    return matchGame && matchSearch;
                });

                // Ordenação
                if (currentSort === 'newest') {
                    filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
                } else if (currentSort === 'downloads') {
                    filtered.sort((a,b) => b.downloads - a.downloads);
                }

                return filtered;
            }

            function renderPage() {
                const filtered = filterScripts();
                const totalItems = filtered.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                const start = (currentPage - 1) * itemsPerPage;
                const pageItems = filtered.slice(start, start + itemsPerPage);

                // Atualizar contagem
                resultCountSpan.textContent = `${totalItems} script${totalItems !== 1 ? 's' : ''} encontrado${totalItems !== 1 ? 's' : ''}`;

                // Grid
                scriptGrid.innerHTML = pageItems.map(s => `
                    <div class="script-card">
                        <div class="card-img">${s.icon}</div>
                        <div class="card-body">
                            <div class="script-name" title="${s.name}">${s.name}</div>
                            <div class="game-name">${s.game}</div>
                            <div class="author">por ${s.author}</div>
                            <div class="card-stats">
                                <span><i class="fas fa-download"></i> ${formatNumber(s.downloads)}</span>
                                <span><i class="far fa-calendar-alt"></i> ${formatDate(s.date)}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Paginação
                renderPagination(totalPages);
            }

            function renderPagination(totalPages) {
                let html = '';
                // Botão anterior
                html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}"><i class="fas fa-chevron-left"></i></button>`;

                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }

                // Próximo
                html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}"><i class="fas fa-chevron-right"></i></button>`;

                paginationDiv.innerHTML = html;

                // Eventos de clique nos botões de página
                document.querySelectorAll('.page-btn:not([disabled])').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const page = parseInt(this.dataset.page);
                        if (page >= 1 && page <= totalPages) {
                            currentPage = page;
                            renderPage();
                            window.scrollTo({ top: 400, behavior: 'smooth' });
                        }
                    });
                });
            }

            function formatNumber(num) {
                if (num >= 1000) {
                    return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
                }
                return num;
            }

            function formatDate(dateStr) {
                const date = new Date(dateStr);
                const day = date.getDate().toString().padStart(2,'0');
                const month = (date.getMonth() + 1).toString().padStart(2,'0');
                return `${day}/${month}`;
            }

            // Event listeners
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value;
                currentPage = 1;
                renderPage();
            });

            gameFilter.addEventListener('click', (e) => {
                const li = e.target.closest('li');
                if (!li) return;
                document.querySelectorAll('#gameFilter li').forEach(l => l.classList.remove('active'));
                li.classList.add('active');
                currentGame = li.dataset.game;
                currentPage = 1;
                renderPage();
            });

            sortBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    sortBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSort = this.dataset.sort;
                    currentPage = 1;
                    renderPage();
                });
            });

            // Inicial
            renderPage();
        })();
    </script>
</body>
</html>
