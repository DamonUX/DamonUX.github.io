<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptBlox Clone Ultra – GitHub Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* =========================================
           1. VARIÁVEIS & RESET (Otimização Global)
           ========================================= */
        :root {
            --bg-base: #09090b; /* Fundo super escuro */
            --bg-surface: rgba(24, 24, 27, 0.6); /* Efeito vidro */
            --bg-surface-solid: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #6366f1; /* Índigo moderno */
            --primary-hover: #4f46e5;
            --secondary: #ec4899; /* Rosa para gradientes */
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.08), transparent 25%);
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        button, input { border: none; outline: none; font-family: inherit; }

        /* =========================================
           2. HEADER & NAVBAR (Glassmorphism)
           ========================================= */
        .navbar {
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: -0.5px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 450px;
            margin: 0 2rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1.2rem 0.8rem 3rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .search-box i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: var(--transition);
        }
        .search-box input:focus + i { color: var(--primary); }

        .nav-links { display: flex; align-items: center; gap: 2rem; }
        .nav-links a { font-weight: 500; color: var(--text-muted); transition: var(--transition); }
        .nav-links a:hover { color: var(--text-main); }
        
        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white !important;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: var(--glow);
            transition: var(--transition);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(99, 102, 241, 0.4); }

        /* =========================================
           3. LAYOUT PRINCIPAL (Grid & Flexbox)
           ========================================= */
        .main-container {
            display: flex;
            flex: 1;
            padding: 2rem 3rem;
            gap: 2.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* =========================================
           4. SIDEBAR (Filtros Estilizados)
           ========================================= */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .sidebar h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            font-weight: 600;
            padding-left: 0.5rem;
        }

        .filter-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .filter-list li {
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 1px solid transparent;
        }

        .filter-list li i { font-size: 1.1rem; width: 20px; text-align: center; }
        .filter-list li:hover { background: rgba(255, 255, 255, 0.03); color: var(--text-main); }
        
        .filter-list li.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--primary);
            color: var(--text-main);
            font-weight: 600;
        }
        .filter-list li.active i { color: var(--primary); }

        /* =========================================
           5. CONTEÚDO & CARDS (Animações e Efeitos)
           ========================================= */
        .content { flex: 1; display: flex; flex-direction: column; gap: 2rem; min-width: 0; }

        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-surface);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .result-count { font-weight: 500; color: var(--text-muted); }
        .result-count strong { color: var(--text-main); }

        .sort-options { display: flex; gap: 0.8rem; }
        .sort-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.85rem;
        }
        .sort-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .sort-btn.active { background: var(--primary); color: white; box-shadow: var(--glow); }

        /* Grid de Scripts */
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        /* Animação de entrada dos cards */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .script-card {
            background: var(--bg-surface-solid);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: fadeUp 0.5s ease backwards;
        }

        .script-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), var(--glow);
        }

        .card-img {
            height: 120px;
            background: linear-gradient(145deg, #18181b, #27272a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }
        
        .card-img::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5));
        }

        .card-body { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .game-badge {
            align-self: flex-start;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .script-name {
            font-weight: 700;
            font-size: 1.1rem;
            line-height: 1.3;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .author { font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
        .author i { color: var(--secondary); font-size: 0.7rem; }

        .card-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-stats { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .card-stats span { display: flex; align-items: center; gap: 0.4rem; }
        .card-stats i { color: var(--primary); }

        /* Botão falso de "Pegar Script" no hover */
        .get-script-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--primary);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transition: var(--transition);
            z-index: 10;
            box-shadow: var(--glow);
            cursor: pointer;
        }
        .script-card:hover .get-script-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .script-card:hover .card-img span { filter: blur(3px); opacity: 0.5; } /* Embaça o emoji no hover */

        /* =========================================
           6. PAGINAÇÃO & FOOTER
           ========================================= */
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }
        
        .page-btn {
            background: var(--bg-surface-solid);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--text-main); }
        .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: var(--glow); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .footer {
            background: var(--bg-surface-solid);
            border-top: 1px solid var(--border-color);
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: auto;
        }
        .footer span { color: var(--secondary); font-weight: 600; }

        /* =========================================
           7. RESPONSIVIDADE (Mobile First Concepts)
           ========================================= */
        @media (max-width: 992px) {
            .main-container { flex-direction: column; padding: 1.5rem; }
            .sidebar { width: 100%; position: static; display: flex; flex-direction: column; }
            .filter-list { flex-direction: row; flex-wrap: wrap; }
            .filter-list li { flex: 1 1 calc(33.33% - 0.5rem); justify-content: center; }
            .navbar { padding: 1rem; flex-direction: column; gap: 1rem; }
            .search-box { margin: 0; max-width: 100%; width: 100%; }
            .nav-links { width: 100%; justify-content: center; }
        }
        @media (max-width: 600px) {
            .filter-list li { flex: 1 1 100%; }
            .sort-bar { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .sort-options { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-cube"></i> ScriptBlox
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar scripts, jogos ou autores..." autocomplete="off">
            <i class="fas fa-search"></i>
        </div>
        <div class="nav-links">
            <a href="#"><i class="fas fa-home"></i> Início</a>
            <a href="#"><i class="fas fa-fire"></i> Populares</a>
            <a href="#" class="btn-login"><i class="fas fa-user"></i> Entrar</a>
        </div>
    </nav>

    <div class="main-container">
        
        <aside class="sidebar">
            <h3><i class="fas fa-layer-group"></i> Categorias</h3>
            <ul class="filter-list" id="gameFilter">
                <li data-game="all" class="active"><i class="fas fa-globe"></i> Todos os Jogos</li>
                <li data-game="Blox Fruits"><i class="fas fa-apple-alt"></i> Blox Fruits</li>
                <li data-game="Adopt Me!"><i class="fas fa-dog"></i> Adopt Me!</li>
                <li data-game="Murder Mystery 2"><i class="fas fa-mask"></i> Murder M. 2</li>
                <li data-game="Pet Simulator X"><i class="fas fa-paw"></i> Pet Simulator X</li>
                <li data-game="Jailbreak"><i class="fas fa-lock"></i> Jailbreak</li>
                <li data-game="Brookhaven"><i class="fas fa-city"></i> Brookhaven</li>
            </ul>
        </aside>

        <main class="content">
            <div class="sort-bar">
                <span class="result-count" id="resultCount">Buscando scripts...</span>
                <div class="sort-options">
                    <button class="sort-btn active" data-sort="newest"><i class="fas fa-clock"></i> Recentes</button>
                    <button class="sort-btn" data-sort="downloads"><i class="fas fa-chart-line"></i> Populares</button>
                </div>
            </div>

            <div class="script-grid" id="scriptGrid"></div>

            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <footer class="footer">
        <p>Desenvolvido com <span>♥</span> para GitHub Pages. Layout Premium Ultra Otimizado.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. DADOS (Mock de API)
            const scripts = [
                { id:1, name:"Auto Farm & Bounty Hunter", game:"Blox Fruits", author:"xXPhoenixXx", downloads:15420, date:"2026-06-28", icon:"🍎" },
                { id:2, name:"ESP Total, Aimbot & Hitbox", game:"Murder Mystery 2", author:"DarkNinja", downloads:13200, date:"2026-06-27", icon:"🎯" },
                { id:3, name:"Pet Duper v3.5 (Undetected)", game:"Adopt Me!", author:"CrystalHacker", downloads:18700, date:"2026-06-29", icon:"🐾" },
                { id:4, name:"Infinite Money & Auto Rob GUI", game:"Jailbreak", author:"RobberMaster", downloads:12100, date:"2026-06-25", icon:"💰" },
                { id:5, name:"Auto Hatch, Farm & Trade", game:"Pet Simulator X", author:"SimFanatic", downloads:9800, date:"2026-06-30", icon:"🥚" },
                { id:6, name:"Fly, Noclip & Troll GUI", game:"Brookhaven", author:"Glitchy", downloads:11500, date:"2026-06-26", icon:"🏠" },
                { id:7, name:"Teleport All Islands GUI", game:"Blox Fruits", author:"PortMaster", downloads:8300, date:"2026-06-24", icon:"🌀" },
                { id:8, name:"Auto Rob Bank & Jewelry", game:"Jailbreak", author:"MoneyHeist", downloads:7600, date:"2026-06-22", icon:"🏦" },
                { id:9, name:"Silent Aim & Wallhack", game:"Murder Mystery 2", author:"SharpShot", downloads:6100, date:"2026-06-20", icon:"🤫" },
                { id:10, name:"Anti-AFK, Auto Sleep & Farm", game:"Adopt Me!", author:"BabyCare", downloads:5400, date:"2026-06-19", icon:"👶" },
                { id:11, name:"Auto Collect All Orbs & Coins", game:"Pet Simulator X", author:"OrbGoblin", downloads:4700, date:"2026-06-18", icon:"✨" },
                { id:12, name:"Admin Commands Panel", game:"Brookhaven", author:"RoleplayKing", downloads:3900, date:"2026-06-17", icon:"🛡️" },
                { id:13, name:"Insta Kill Bosses (Patch 1.4)", game:"Blox Fruits", author:"OneShot", downloads:3100, date:"2026-06-16", icon:"⚔️" },
                { id:14, name:"Trade Scam Script (Visual)", game:"Adopt Me!", author:"TrustMeBro", downloads:2100, date:"2026-06-15", icon:"⚠️" },
                { id:15, name:"Auto Arrest All Criminals", game:"Jailbreak", author:"CopBot", downloads:1800, date:"2026-06-14", icon:"🚔" }
            ];

            // 2. ESTADOS DA APLICAÇÃO
            let state = {
                game: 'all',
                sort: 'newest',
                search: '',
                page: 1,
                itemsPerPage: 12
            };

            // 3. SELETORES DOM
            const DOM = {
                search: document.getElementById('searchInput'),
                gameFilter: document.getElementById('gameFilter'),
                sortBtns: document.querySelectorAll('.sort-btn'),
                grid: document.getElementById('scriptGrid'),
                pagination: document.getElementById('pagination'),
                count: document.getElementById('resultCount')
            };

            // 4. LÓGICA DE FILTRAGEM E ORDENAÇÃO
            const getProcessedScripts = () => {
                let result = scripts.filter(s => {
                    const matchGame = state.game === 'all' || s.game === state.game;
                    const term = state.search.toLowerCase();
                    const matchSearch = s.name.toLowerCase().includes(term) || 
                                        s.author.toLowerCase().includes(term) || 
                                        s.game.toLowerCase().includes(term);
                    return matchGame && matchSearch;
                });

                result.sort((a, b) => {
                    if (state.sort === 'newest') return new Date(b.date) - new Date(a.date);
                    return b.downloads - a.downloads;
                });

                return result;
            };

            // 5. RENDERIZAÇÃO DA INTERFACE
            const render = () => {
                const data = getProcessedScripts();
                const total = data.length;
                const totalPages = Math.ceil(total / state.itemsPerPage) || 1;
                
                if (state.page > totalPages) state.page = totalPages;
                
                const start = (state.page - 1) * state.itemsPerPage;
                const paginatedData = data.slice(start, start + state.itemsPerPage);

                // Atualiza contador
                DOM.count.innerHTML = `<strong>${total}</strong> script${total !== 1 ? 's' : ''} encontrado${total !== 1 ? 's' : ''}`;

                // Renderiza Cards com delay em cascata para a animação
                DOM.grid.innerHTML = paginatedData.map((s, index) => `
                    <div class="script-card" style="animation-delay: ${index * 0.05}s">
                        <div class="card-img">
                            <span style="transition: all 0.3s;">${s.icon}</span>
                            <div class="get-script-btn">Ver Script</div>
                        </div>
                        <div class="card-body">
                            <span class="game-badge">${s.game}</span>
                            <div class="script-name" title="${s.name}">${s.name}</div>
                            <div class="author"><i class="fas fa-check-circle"></i> por ${s.author}</div>
                            <div class="card-footer">
                                <div class="card-stats">
                                    <span><i class="fas fa-download"></i> ${formatNum(s.downloads)}</span>
                                </div>
                                <div class="card-stats">
                                    <span><i class="far fa-calendar"></i> ${formatDate(s.date)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                renderPagination(totalPages);
            };

            // 6. RENDERIZAÇÃO DA PAGINAÇÃO
            const renderPagination = (totalPages) => {
                let html = `<button class="page-btn" ${state.page === 1 ? 'disabled' : ''} data-page="${state.page - 1}"><i class="fas fa-angle-left"></i></button>`;
                
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${i === state.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }
                
                html += `<button class="page-btn" ${state.page === totalPages ? 'disabled' : ''} data-page="${state.page + 1}"><i class="fas fa-angle-right"></i></button>`;
                
                DOM.pagination.innerHTML = html;

                // Eventos de clique na paginação
                document.querySelectorAll('.page-btn:not([disabled])').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        state.page = parseInt(e.currentTarget.dataset.page);
                        render();
                        window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll suave pro topo
                    });
                });
            };

            // 7. FUNÇÕES UTILITÁRIAS (Formatadores)
            const formatNum = (num) => num >= 1000 ? (num / 1000).toFixed(1).replace('.0', '') + 'k' : num;
            const formatDate = (dateStr) => {
                const [y, m, d] = dateStr.split('-');
                return `${d}/${m}`;
            };

            // 8. EVENT LISTENERS (Interatividade)
            DOM.search.addEventListener('input', (e) => {
                state.search = e.target.value;
                state.page = 1;
                render();
            });

            DOM.gameFilter.addEventListener('click', (e) => {
                const li = e.target.closest('li');
                if (!li) return;
                document.querySelectorAll('#gameFilter li').forEach(l => l.classList.remove('active'));
                li.classList.add('active');
                state.game = li.dataset.game;
                state.page = 1;
                render();
            });

            DOM.sortBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    DOM.sortBtns.forEach(b => b.classList.remove('active'));
                    const target = e.currentTarget;
                    target.classList.add('active');
                    state.sort = target.dataset.sort;
                    state.page = 1;
                    render();
                });
            });

            // Inicialização
            render();
        });
    </script>
</body>
</html>
