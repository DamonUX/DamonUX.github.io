    const firebaseConfig = {

        projectId: "damonux",
        storageBucket: "damonux.firebasestorage.app",
        messagingSenderId: "398509543259",

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);
    const scriptsCollection = collection(db, "scripts");

    // =========================================

    const SCRIPTS_DB_INICIAL = [

        },
        {

        },
        {
            id: 4,
            title: "Auto Farm & Collect",
            description: "Automatiza coleta de recursos e farm de XP em diversos modos.",
            badge: "ÚTIL",
            link_encurtado: "https://linkvertise.com/123456/auto-farm",
            codigo: 'loadstring(game:HttpGet("https://pastebin.com/raw/Exemplo4"))()',

            badge: null,
            link_encurtado: "https://linkvertise.com/123456/esp-pack",

        }

    let SCRIPTS_DB = [];

    // =========================================
    // FUNÇÕES FIRESTORE
    // =========================================
    async function carregarScriptsDoFirestore() {
        try {
            const q = query(scriptsCollection, orderBy("id", "asc"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                console.log("Firestore vazio, populando...");
                for (const script of SCRIPTS_DB_INICIAL) {
                    await addDoc(scriptsCollection, script);
                }
                const newSnapshot = await getDocs(q);
                SCRIPTS_DB = newSnapshot.docs.map(doc => ({ firestoreId: doc.id, ...doc.data() }));
            } else {
                SCRIPTS_DB = snapshot.docs.map(doc => ({ firestoreId: doc.id, ...doc.data() }));
            }
        } catch (error) {
            console.error("Erro ao carregar scripts:", error);
            carregarFallback();
        }
    }

    function carregarFallback() {
        const dados = localStorage.getItem('damonux_scripts_db');
        SCRIPTS_DB = dados ? JSON.parse(dados) : JSON.parse(JSON.stringify(SCRIPTS_DB_INICIAL));
    }

    async function adicionarScript(script) {
        try {
            const docRef = await addDoc(scriptsCollection, script);
            script.firestoreId = docRef.id;
            return true;
        } catch (e) {
            console.error(e);
            return false;
        }
    }

    async function atualizarScript(script) {
        if (!script.firestoreId) return false;
        try {
            const { firestoreId, ...dados } = script;
            await updateDoc(doc(db, "scripts", firestoreId), dados);
            return true;
        } catch (e) {
            console.error(e);
            return false;
        }
    }

    async function deletarScript(script) {
        if (!script.firestoreId) return false;
        try {
            await deleteDoc(doc(db, "scripts", script.firestoreId));
            return true;
        } catch (e) {
            console.error(e);
            return false;
        }
    }

    function gerarNovoId() {
        return SCRIPTS_DB.length ? Math.max(...SCRIPTS_DB.map(s => s.id)) + 1 : 1;
    }

    // =========================================
    // REFERÊNCIAS DOM
    // =========================================
    const containerScripts = document.getElementById('scripts-list');
    const contadorElemento = document.getElementById('contador-scripts');
    const buscaInput = document.getElementById('busca-scripts');

    const modalOverlay = document.getElementById('modal-overlay');
    const modalThumbnail = document.getElementById('modal-thumbnail');
    const modalTitulo = document.getElementById('modal-titulo');
    const modalDesc = document.getElementById('modal-desc');
    const modalProsseguir = document.getElementById('modal-prosseguir');
    const modalClose = document.getElementById('modal-close');

    const adminToggleBtn = document.getElementById('admin-toggle-btn');
    const adminOverlay = document.getElementById('admin-overlay');
    const adminClose = document.getElementById('admin-close');
    const adminLoginDiv = document.getElementById('admin-login');
    const adminContentDiv = document.getElementById('admin-content');
    const adminEmailInput = document.getElementById('admin-email-input');
    const adminSenhaInput = document.getElementById('admin-senha-input');
    const adminLoginBtn = document.getElementById('admin-login-btn');
    const adminErroSenha = document.getElementById('admin-erro-senha');
    const adminMensagem = document.getElementById('admin-mensagem');
    const adminEditId = document.getElementById('admin-edit-id');
    const adminTituloInput = document.getElementById('admin-titulo-input');
    const adminDescInput = document.getElementById('admin-desc-input');
    const adminLinkInput = document.getElementById('admin-link-input');
    const adminCodigoInput = document.getElementById('admin-codigo-input');
    const adminThumbInput = document.getElementById('admin-thumb-input');
    const adminBadgeInput = document.getElementById('admin-badge-input');
    const adminModalDescInput = document.getElementById('admin-modal-desc-input');
    const adminSalvarBtn = document.getElementById('admin-salvar-btn');
    const adminExcluirBtn = document.getElementById('admin-excluir-btn');
    const adminCancelarBtn = document.getElementById('admin-cancelar-btn');
    const adminSairBtn = document.getElementById('admin-sair-btn');
    const adminScriptsList = document.getElementById('admin-scripts-list');

    let linkAtual = '';

    // =========================================
    // PARTÍCULAS (mantido igual)
    // =========================================
    const canvas = document.getElementById('particle-canvas');
    if (canvas) {
        const ctx = canvas.getContext('2d');
        let particulas = [], animacaoId = null, pausado = false;
        const TOTAL = 45, FRAME = 1000/60;
        let ultimo = 0;

        function redim() {
            const dpr = Math.min(devicePixelRatio||1,2);
            canvas.width = innerWidth*dpr; canvas.height = innerHeight*dpr;
            canvas.style.width = innerWidth+'px'; canvas.style.height = innerHeight+'px';
            ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
        }
        window.addEventListener('resize', ()=>{ redim(); criar(); });
        redim();

        function criar() {
            particulas = [];
            for(let i=0;i<TOTAL;i++) particulas.push({
                x: Math.random()*innerWidth, y: Math.random()*innerHeight,
                vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
                tam: Math.random()*2.4+0.7, brilho: Math.random()*0.16+0.06,
                varBrilho: Math.random()*0.04, fase: Math.random()*Math.PI*2
            });
        }
        criar();

        function desenhar(t) {
            if(pausado){ requestAnimationFrame(desenhar); return; }
            if(t-ultimo < FRAME){ requestAnimationFrame(desenhar); return; }
            ultimo = t;
            ctx.clearRect(0,0,innerWidth,innerHeight);
            const tempo = t*0.001;
            for(const p of particulas){
                p.x += p.vx; p.y += p.vy;
                if(p.x<-15)p.x=innerWidth+15; if(p.x>innerWidth+15)p.x=-15;
                if(p.y<-15)p.y=innerHeight+15; if(p.y>innerHeight+15)p.y=-15;
                const alpha = Math.max(0.04, Math.min(0.25, p.brilho + Math.sin(tempo*2.5+p.fase)*p.varBrilho));
                ctx.beginPath(); ctx.arc(p.x,p.y,p.tam,0,Math.PI*2);
                ctx.fillStyle = `rgba(0,255,65,${alpha})`; ctx.fill();
                if(p.tam>1.8 && alpha>0.12){
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.tam*1.8,0,Math.PI*2);
                    ctx.fillStyle = `rgba(0,255,65,${alpha*0.25})`; ctx.fill();
                }
            }
            requestAnimationFrame(desenhar);
        }
        const motion = matchMedia('(prefers-reduced-motion: reduce)');
        if(!motion.matches) requestAnimationFrame(desenhar); else pausado=true;
        motion.addEventListener('change', e=>{
            pausado = e.matches;
            if(pausado && animacaoId) cancelAnimationFrame(animacaoId);
            else if(!pausado){ ultimo=performance.now(); requestAnimationFrame(desenhar); }
        });
    }

    // =========================================
    // FUNÇÕES UTILITÁRIAS
    // =========================================
    function escaparHTML(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function criarRipple(e,b){
        const r=document.createElement('span'); r.className='ripple';
        const rect=b.getBoundingClientRect(), tam=Math.max(rect.width,rect.height);
        r.style.width=r.style.height=tam+'px';
        r.style.left=(e.clientX-rect.left-tam/2)+'px';
        r.style.top=(e.clientY-rect.top-tam/2)+'px';
        b.appendChild(r); r.addEventListener('animationend',()=>r.remove());
    }
    function mostrarMsg(msg,cor){
        if(!adminMensagem)return;
        adminMensagem.textContent=msg; adminMensagem.style.color=cor||'var(--cor-primaria)';
        setTimeout(()=>{if(adminMensagem)adminMensagem.textContent='';},3000);
    }

    // =========================================
    // MODAL
    // =========================================
    function abrirModal(s){
        if(!modalOverlay)return;
        linkAtual=s.link_encurtado;
        modalTitulo.textContent=s.title;
        modalDesc.textContent=s.modal_description||s.description;
        if(s.thumbnail?.trim()){
            modalThumbnail.src=s.thumbnail; modalThumbnail.style.display='block'; modalThumbnail.classList.remove('placeholder');
            modalThumbnail.onerror=()=>{ modalThumbnail.style.display='none'; mostrarPlaceholder(); };
        }else{
            modalThumbnail.style.display='none'; mostrarPlaceholder();
        }
        modalOverlay.classList.add('ativo'); modalOverlay.setAttribute('aria-hidden','false');
        document.body.style.overflow='hidden';
    }
    function mostrarPlaceholder(){
        if(!document.getElementById('thumb-ph')){
            const ph=document.createElement('div'); ph.id='thumb-ph'; ph.className='modal-thumbnail placeholder';
            ph.innerHTML='<span>📷 CAPA DO SCRIPT<br>(adicione o link no campo "thumbnail" do DB)</span>';
            modalThumbnail.parentNode.insertBefore(ph, modalThumbnail.nextSibling);
        }else document.getElementById('thumb-ph').style.display='flex';
    }
    function fecharModal(){
        if(!modalOverlay)return;
        modalOverlay.classList.remove('ativo'); modalOverlay.setAttribute('aria-hidden','true');
        document.body.style.overflow='';
        const ph=document.getElementById('thumb-ph'); if(ph)ph.style.display='none';
        modalThumbnail.style.display='block';
    }
    modalClose?.addEventListener('click', fecharModal);
    modalOverlay?.addEventListener('click', e=>{ if(e.target===modalOverlay)fecharModal(); });
    document.addEventListener('keydown', e=>{
        if(e.key==='Escape'){
            if(modalOverlay?.classList.contains('ativo')) fecharModal();
            if(adminOverlay?.classList.contains('ativo')) fecharAdmin();
        }
    });
    modalProsseguir?.addEventListener('click', ()=>{ if(linkAtual){ open(linkAtual,'_blank','noopener,noreferrer'); fecharModal(); } });

    // =========================================
    // RENDERIZAÇÃO SCRIPTS
    // =========================================
    function renderizarScripts(){
        if(!containerScripts)return;
        containerScripts.innerHTML = SCRIPTS_DB.map(s=>`
            <article class="script-item" data-id="${s.id}" data-titulo="${escaparHTML(s.title).toLowerCase()}" data-descricao="${escaparHTML(s.description).toLowerCase()}">
                <div class="script-item-header">
                    <h3 class="script-item-title">&gt; ${escaparHTML(s.title)}</h3>
                    ${s.badge?`<span class="badge">${escaparHTML(s.badge)}</span>`:''}
                </div>
                <p class="script-item-desc">${escaparHTML(s.description)}</p>
                <div class="acoes-botoes">
                    <button class="btn-obter" data-id="${s.id}">OBTER SCRIPT</button>
                    <button class="btn-detalhes" aria-expanded="false">[+]</button>
                </div>
                <div class="script-details"><pre><code>${escaparHTML(s.codigo)}</code></pre>
                    <button class="btn-copiar-codigo" data-codigo="${escaparHTML(s.codigo)}">📋 COPIAR CÓDIGO</button>
                </div>
            </article>
        `).join('');
        if(contadorElemento) contadorElemento.textContent = SCRIPTS_DB.length + ' SCRIPTS DISPONÍVEIS';
        vincularEventosScripts();
    }
    function vincularEventosScripts(){
        containerScripts.querySelectorAll('.btn-obter').forEach(b=>b.addEventListener('click', function(e){
            criarRipple(e,this);
            const id=+this.dataset.id; const s=SCRIPTS_DB.find(s=>s.id===id); if(s)abrirModal(s);
        }));
        containerScripts.querySelectorAll('.btn-detalhes').forEach(b=>b.addEventListener('click', function(e){
            criarRipple(e,this); const item=this.closest('.script-item'); if(!item)return;
            const exp=item.classList.toggle('expandido'); this.setAttribute('aria-expanded',exp); this.textContent=exp?'[-]':'[+]';
        }));
        containerScripts.querySelectorAll('.btn-copiar-codigo').forEach(b=>b.addEventListener('click', function(e){
            criarRipple(e,this); const cod=this.dataset.codigo; if(!cod)return;
            navigator.clipboard?.writeText(cod).then(()=>{
                this.classList.add('copiado'); this.innerHTML='✓ COPIADO!';
                setTimeout(()=>{ this.classList.remove('copiado'); this.innerHTML='📋 COPIAR CÓDIGO'; },2000);
            }).catch(()=>{
                const ta=document.createElement('textarea'); ta.value=cod; ta.style.position='fixed'; ta.style.opacity='0';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                this.classList.add('copiado'); this.innerHTML='✓ COPIADO!';
                setTimeout(()=>{ this.classList.remove('copiado'); this.innerHTML='📋 COPIAR CÓDIGO'; },2000);
            });
        }));
    }

    // =========================================
    // FILTRO
    // =========================================
    buscaInput?.addEventListener('input', function(){
        const t=this.value.trim().toLowerCase(); const itens=document.querySelectorAll('.script-item'); let v=0;
        itens.forEach(i=>{
            const ti=i.dataset.titulo||'', de=i.dataset.descricao||'';
            if(ti.includes(t)||de.includes(t)){ i.classList.remove('oculto'); v++; }
            else i.classList.add('oculto');
        });
        if(contadorElemento) contadorElemento.textContent = t ? `${v} DE ${SCRIPTS_DB.length} SCRIPTS` : `${SCRIPTS_DB.length} SCRIPTS DISPONÍVEIS`;
    });

    // =========================================
    // ADMIN - AUTENTICAÇÃO
    // =========================================
    function abrirAdmin(){
        if(!adminOverlay)return;
        adminOverlay.classList.add('ativo'); adminOverlay.setAttribute('aria-hidden','false');
        document.body.style.overflow='hidden';
        // Garantir que login aparece se não autenticado
        if(!auth.currentUser){
            adminLoginDiv.style.display='flex'; adminContentDiv.classList.remove('visivel');
        } else {
            adminLoginDiv.style.display='none'; adminContentDiv.classList.add('visivel');
            renderizarAdminScriptsList(); limparFormAdmin();
        }
        setTimeout(()=> adminEmailInput?.focus(), 400);
    }
    function fecharAdmin(){
        if(!adminOverlay)return;
        adminOverlay.classList.remove('ativo'); adminOverlay.setAttribute('aria-hidden','true');
        document.body.style.overflow='';
    }
    async function loginAdmin(){
        const email = adminEmailInput.value.trim();
        const senha = adminSenhaInput.value;
        if(!email||!senha){ adminErroSenha.textContent='⚠️ Preencha e-mail e senha!'; return; }
        try{
            await signInWithEmailAndPassword(auth, email, senha);
            // onAuthStateChanged vai mostrar o conteúdo
        }catch(e){
            adminErroSenha.textContent = '⚠️ ' + (e.code==='auth/invalid-credential'?'E-mail ou senha inválidos.':e.message);
        }
    }
    function logoutAdmin(){
        signOut(auth);
    }

    // Monitora estado de autenticação
    onAuthStateChanged(auth, user=>{
        if(user){
            // Logado
            adminLoginDiv.style.display = 'none';
            adminContentDiv.classList.add('visivel');
            renderizarAdminScriptsList();
            limparFormAdmin();
            adminEmailInput.value = '';
            adminSenhaInput.value = '';
            adminErroSenha.textContent = '';
        } else {
            // Deslogado
            adminLoginDiv.style.display = 'flex';
            adminContentDiv.classList.remove('visivel');
        }
    });

    // Eventos de login/logout
    adminLoginBtn?.addEventListener('click', loginAdmin);
    adminSenhaInput?.addEventListener('keydown', e=>{ if(e.key==='Enter') loginAdmin(); });
    adminEmailInput?.addEventListener('keydown', e=>{ if(e.key==='Enter') adminSenhaInput?.focus(); });
    adminSairBtn?.addEventListener('click', logoutAdmin);

    // =========================================
    // ADMIN - CRUD
    // =========================================
    function renderizarAdminScriptsList(){
        if(!adminScriptsList)return;
        if(!SCRIPTS_DB.length){ adminScriptsList.innerHTML='<p style="color:var(--cor-texto-secundario); text-align:center;">Nenhum script.</p>'; return; }
        adminScriptsList.innerHTML = SCRIPTS_DB.map(s=>`
            <div class="admin-script-item">
                <span>${escaparHTML(s.title)} ${s.badge?`<small style="color:var(--cor-admin);">[${escaparHTML(s.badge)}]</small>`:''}</span>
                <button class="btn-admin editar-admin" data-id="${s.id}" style="flex:0.5;padding:7px 10px;font-size:0.7rem;">✏️ EDITAR</button>
            </div>
        `).join('');
        adminScriptsList.querySelectorAll('.editar-admin').forEach(b=>b.addEventListener('click', ()=>{
            carregarEdicao(+b.dataset.id);
        }));
    }
    function carregarEdicao(id){
        const s = SCRIPTS_DB.find(s=>s.id===id); if(!s)return;
        adminEditId.value = s.id;
        adminTituloInput.value = s.title;
        adminDescInput.value = s.description;
        adminLinkInput.value = s.link_encurtado;
        adminCodigoInput.value = s.codigo;
        adminThumbInput.value = s.thumbnail||'';
        adminBadgeInput.value = s.badge||'';
        adminModalDescInput.value = s.modal_description||'';
        adminExcluirBtn.style.display='inline-flex'; adminCancelarBtn.style.display='inline-flex';
        adminSalvarBtn.textContent='💾 ATUALIZAR SCRIPT';
        adminTituloInput.focus();
        adminOverlay.querySelector('.admin-panel').scrollTop=0;
    }
    function limparFormAdmin(){
        adminEditId.value=''; adminTituloInput.value=''; adminDescInput.value=''; adminLinkInput.value='';
        adminCodigoInput.value=''; adminThumbInput.value=''; adminBadgeInput.value=''; adminModalDescInput.value='';
        adminExcluirBtn.style.display='none'; adminCancelarBtn.style.display='none';
        adminSalvarBtn.textContent='💾 SALVAR / ADICIONAR';
    }
    async function salvarScriptAdmin(){
        const titulo = adminTituloInput.value.trim();
        const link = adminLinkInput.value.trim();
        if(!titulo||!link){ mostrarMsg('⚠️ Título e Link são obrigatórios!','#ff5f56'); return; }
        const editId = adminEditId.value;
        if(editId){
            const idx = SCRIPTS_DB.findIndex(s=>s.id===+editId);
            if(idx!==-1){
                SCRIPTS_DB[idx].title=titulo; SCRIPTS_DB[idx].description=adminDescInput.value.trim();
                SCRIPTS_DB[idx].link_encurtado=link; SCRIPTS_DB[idx].codigo=adminCodigoInput.value.trim();
                SCRIPTS_DB[idx].thumbnail=adminThumbInput.value.trim(); SCRIPTS_DB[idx].badge=adminBadgeInput.value.trim()||null;
                SCRIPTS_DB[idx].modal_description=adminModalDescInput.value.trim();
                const ok = await atualizarScript(SCRIPTS_DB[idx]);
                mostrarMsg(ok?'✅ Script atualizado!':'❌ Erro ao atualizar.', ok?'var(--cor-primaria)':'#ff5f56');
            }
        }else{
            const novo = {
                id: gerarNovoId(), title: titulo, description: adminDescInput.value.trim(),
                link_encurtado: link, codigo: adminCodigoInput.value.trim(),
                thumbnail: adminThumbInput.value.trim(), badge: adminBadgeInput.value.trim()||null,
                modal_description: adminModalDescInput.value.trim()
            };
            const ok = await adicionarScript(novo);
            if(ok){ SCRIPTS_DB.push(novo); mostrarMsg('✅ Script adicionado!'); }
            else mostrarMsg('❌ Erro ao salvar.','#ff5f56');
        }
        limparFormAdmin(); renderizarScripts(); renderizarAdminScriptsList();
        if(contadorElemento) contadorElemento.textContent = SCRIPTS_DB.length+' SCRIPTS DISPONÍVEIS';
    }
    async function excluirScriptAdmin(){
        const editId = adminEditId.value; if(!editId)return;
        if(!confirm('Excluir permanentemente?'))return;
        const s = SCRIPTS_DB.find(s=>s.id===+editId); if(!s)return;
        const ok = await deletarScript(s);
        if(ok){ SCRIPTS_DB = SCRIPTS_DB.filter(s=>s.id!==+editId); mostrarMsg('🗑️ Script excluído.','#ff5f56'); }
        else mostrarMsg('❌ Erro ao excluir.','#ff5f56');
        limparFormAdmin(); renderizarScripts(); renderizarAdminScriptsList();
        if(contadorElemento) contadorElemento.textContent = SCRIPTS_DB.length+' SCRIPTS DISPONÍVEIS';
    }

    adminSalvarBtn?.addEventListener('click', salvarScriptAdmin);
    adminExcluirBtn?.addEventListener('click', excluirScriptAdmin);
    adminCancelarBtn?.addEventListener('click', ()=>{ limparFormAdmin(); mostrarMsg('Edição cancelada.','var(--cor-texto-secundario)'); });
    adminToggleBtn?.addEventListener('click', abrirAdmin);
    adminClose?.addEventListener('click', fecharAdmin);
    adminOverlay?.addEventListener('click', e=>{ if(e.target===adminOverlay) fecharAdmin(); });

    // =========================================
    // TÍTULO, UPTIME, ETC.
    // =========================================
    const tituloEl = document.getElementById('titulo-principal');
    let idxLetra=0;
    function digitarTitulo(){
        if(!tituloEl)return;
        if(idxLetra<7){
            tituloEl.textContent='DamonUX'.substring(0,idxLetra+1); idxLetra++;
            setTimeout(digitarTitulo,85+Math.random()*40);
        }else{
            const c=document.createElement('span'); c.className='cursor-piscante'; c.textContent='_'; tituloEl.appendChild(c);
            agendarGlitch(); digitarBoasVindas();
        }
    }
    function agendarGlitch(){
        if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
        setTimeout(()=>{
            if(tituloEl){ tituloEl.classList.add('efect-glitch'); setTimeout(()=>{ tituloEl.classList.remove('efect-glitch'); agendarGlitch(); },350); }
        },5000+Math.random()*10000);
    }
    const welcomeEl = document.getElementById('welcome-typing');
    function digitarBoasVindas(){
        if(!welcomeEl)return;
        let i=0; const msg='Olá, seja bem-vindo(a) à nossa central de scripts!';
        welcomeEl.textContent='';
        function dig(){ if(i<msg.length){ welcomeEl.textContent+=msg.charAt(i); i++; setTimeout(dig,30+Math.random()*20); } }
        dig();
    }
    if(tituloEl && !matchMedia('(prefers-reduced-motion: reduce)').matches) digitarTitulo();
    else if(tituloEl){ tituloEl.textContent='DamonUX'; const c=document.createElement('span'); c.className='cursor-piscante'; c.textContent='_'; tituloEl.appendChild(c); welcomeEl.textContent='Olá, seja bem-vindo(a) à nossa central de scripts!'; }

    const uptimeEl=document.getElementById('uptime'), usuariosEl=document.getElementById('online-users');
    function atualizarUptime(){
        if(!uptimeEl)return;
        const agora=new Date(), diff=Math.max(0,Math.floor((agora-new Date('2024-01-15'))/1000));
        const d=Math.floor(diff/86400), h=Math.floor((diff%86400)/3600), m=Math.floor((diff%3600)/60);
        uptimeEl.textContent=`UPTIME ${d}d ${h}h ${m}m`;
    }
    setInterval(atualizarUptime,60000); atualizarUptime();
    setInterval(()=>{ if(usuariosEl) usuariosEl.textContent = Math.floor(Math.random()*121+60)+' ONLINE'; },45000);
    atualizarUptime(); if(usuariosEl) usuariosEl.textContent = Math.floor(Math.random()*121+60)+' ONLINE';

    document.getElementById('ano-atual').textContent = new Date().getFullYear();

    // FAQ
    document.querySelectorAll('.faq-question').forEach(q=>{
        q.addEventListener('click', function(){
            const item=this.closest('.faq-item'); if(!item)return;
            const estava=item.classList.contains('ativa');
            document.querySelectorAll('.faq-item').forEach(f=>{ f.classList.remove('ativa'); f.querySelector('.faq-question')?.setAttribute('aria-expanded','false'); });
            if(!estava){ item.classList.add('ativa'); this.setAttribute('aria-expanded','true'); }
        });
        q.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); q.click(); } });
    });

    // Inicialização
    (async function(){
        await carregarScriptsDoFirestore();
        renderizarScripts();
    })();
</script>
